name: Cargo Build & Test

on:
  workflow_call:
    inputs:
      targets:
        description: 'JSON array of Rust targets'
        type: string
        default: '["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]'
      just-commands:
        description: 'JSON array of just commands to run'
        type: string
        default: '["build", "clippy", "bevy-lint", "test"]'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ${{ fromJSON(inputs.targets || '["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup
        with:
          cargo-cache-prefix: ${{ matrix.target }}

      - name: Run just commands
        env:
          COMMANDS: ${{ inputs.just-commands || '["build", "clippy", "bevy-lint", "test"]' }}
        run: |
          echo "$COMMANDS" | jq -r '.[]' | while read -r cmd; do
            echo "::group::just $cmd"
            nix develop --command just "$cmd"
            echo "::endgroup::"
          done
