name: Cargo Build & Test

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: true

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /tmp/nix-cache
          key: nix-${{ matrix.target }}-${{ hashFiles('flake.lock') }}
          restore-keys: nix-${{ matrix.target }}-

      - name: Import Nix cache
        run: |
          if [ -f /tmp/nix-cache/archive.nar ]; then
            nix-store --import < /tmp/nix-cache/archive.nar || true
          fi

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-ci-${{ hashFiles('**/Cargo.toml') }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install dependencies
        shell: bash
        run: >
          sudo apt-get update;
          sudo apt-get install -y --no-install-recommends
          libasound2-dev
          libudev-dev
          libwayland-dev
          ;

      - run: nix develop --command just build
      - run: nix develop --command just clippy
      - run: nix develop --command just bevy-lint
      - run: nix develop --command just test

      - name: Export Nix cache
        if: always()
        run: |
          mkdir -p /tmp/nix-cache
          nix-store --export $(nix-store -qR $(nix develop --command bash -c 'echo $buildInputs $nativeBuildInputs' 2>/dev/null) 2>/dev/null) > /tmp/nix-cache/archive.nar 2>/dev/null || true
