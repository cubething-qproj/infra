name: Sync downstream repos

on:
  push:
    branches: [main]

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.read.outputs.repos }}
    steps:
      - uses: actions/checkout@v7
      - id: read
        run: echo "repos=$(jq -c '.' downstream-repos.json)" >> "$GITHUB_OUTPUT"

  sync:
    runs-on: ubuntu-latest
    needs: load-config
    strategy:
      matrix:
        repo: ${{ fromJson(needs.load-config.outputs.repos) }}
    steps:
      - name: Checkout infra
        uses: actions/checkout@v7
        with:
          path: infra

      - name: Checkout downstream
        uses: actions/checkout@v7
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: downstream

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync files
        run: |
          cd downstream
          git checkout -B automation/sync-infra

          # Copy files per sync-files.json
          jq -c '.[]' ../infra/sync-files.json | while read -r entry; do
            src=$(echo "$entry" | jq -r '.src')
            dst=$(echo "$entry" | jq -r '.dst')
            mkdir -p "$(dirname "$dst")"
            cp "../infra/$src" "$dst"
          done

          # Merge shared workspace/profile/lints blocks into the
          # downstream Cargo.toml, preserving its own [package],
          # [dependencies], [features], [[bin]], etc.
          if [ -f Cargo.toml ]; then
            uvx --from ../infra/scripts qproj-scripts patch-cargo \
              Cargo.toml \
              --template ../infra/config/Cargo.workspace.toml
          fi

          # Stage copied files so Nix can see them in the git repo
          git add -A

          # Update flake.lock
          nix flake update

          # Check for changes
          git add -A
          if git diff --cached --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
          else
            echo "NO_CHANGES=false" >> "$GITHUB_ENV"
          fi

      - name: Commit and push
        if: env.NO_CHANGES == 'false'
        run: |
          cd downstream
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync CI and shared config from infra

          Auto-generated by cubething-qproj/infra sync workflow.
          Source commit: ${{ github.sha }}"
          git push --force origin automation/sync-infra

      - name: Create or update PR
        if: env.NO_CHANGES == 'false'
        run: |
          cd downstream
          EXISTING_PR=$(gh pr list --head automation/sync-infra --json number -q '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, force-pushed update"
          else
            gh pr create \
              --title "chore: sync CI and shared config from infra" \
              --body "Automated sync from [cubething-qproj/infra@${{ github.sha }}](https://github.com/cubething-qproj/infra/commit/${{ github.sha }}).

          This PR will auto-merge if CI passes." \
              --head automation/sync-infra \
              --assignee ada-x64
          fi
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
