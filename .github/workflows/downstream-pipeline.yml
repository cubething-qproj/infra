name: Downstream pipeline

on:
    workflow_call:
        secrets:
            DISPATCH_TOKEN:
                description: "PAT with contents:write and pull-requests:write for auto-merge."
                required: true

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1
    SCCACHE_GHA_ENABLED: true

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        strategy:
            matrix:
                target: [x86_64-unknown-linux-gnu]
        steps:
            - uses: actions/checkout@v7
            - uses: cubething-qproj/infra/.github/actions/setup@main
              with:
                  cargo-cache-prefix: ${{ matrix.target }}
            - uses: nicknovitski/nix-develop@v1
              with:
                  arguments: .#ci
            - run: uv tool install qproj-scripts --from git+https://github.com/cubething-qproj/infra@main#subdirectory=scripts
            - run: qproj-scripts build
            - run: qproj-scripts check
            - run: qproj-scripts test

    generate-coverage:
        needs: build_and_test
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        env:
            RUSTFLAGS: -Zcodegen-backend=llvm
        steps:
            - uses: actions/checkout@v7
              with:
                  submodules: recursive
            - uses: cubething-qproj/infra/.github/actions/setup@main
              with:
                  cargo-cache-prefix: coverage
            - uses: nicknovitski/nix-develop@v1
              with:
                  arguments: .#ci-coverage
            - name: Detect package name
              id: pkg
              run: echo "name=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"
            - name: Collect coverage data
              run: cargo llvm-cov nextest --lcov --output-path report.lcov
            - name: Upload to coveralls
              uses: coverallsapp/github-action@v2.3.6
              with:
                  flag-name: ${{ steps.pkg.outputs.name }}

    auto-merge:
        needs: [build_and_test, generate-coverage]
        if: github.event_name == 'pull_request' && github.head_ref == 'automation/sync-infra'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - run: gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch --repo ${{ github.repository }}
              env:
                  GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

    notify-failure:
        needs: [build_and_test, generate-coverage]
        if: failure() && github.event_name == 'pull_request' && github.head_ref == 'automation/sync-infra'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            issues: write
        steps:
            - name: Create or update failure issue
              env:
                  GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
              run: |
                  TITLE="CI sync failure from infra"
                  BODY="CI failed on automation/sync-infra PR #${{ github.event.pull_request.number }}.

                  Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

                  Please investigate and fix manually."

                  EXISTING=$(gh issue list --repo ${{ github.repository }} --search "is:open in:title $TITLE" --json number,title -q '.[] | select(.title == "CI sync failure from infra") | .number' | head -1)
                  if [ -n "$EXISTING" ]; then
                    gh issue comment "$EXISTING" --repo ${{ github.repository }} --body "$BODY"
                  else
                    gh issue create --repo ${{ github.repository }} --title "$TITLE" --body "$BODY" --assignee ada-x64
                  fi
