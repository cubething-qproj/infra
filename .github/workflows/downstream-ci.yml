name: Downstream CI

on:
    workflow_call:
        inputs:
            caller-event-name:
                description: "github.event_name from the caller workflow (reusable workflows always see workflow_call)"
                type: string
                required: true
            caller-head-ref:
                description: "github.head_ref from the caller workflow (for PR branch detection)"
                type: string
                default: ""
            caller-pr-number:
                description: "github.event.pull_request.number from the caller"
                type: string
                default: ""
            failure-assignees:
                description: "Comma-separated list of GitHub usernames to assign on failure"
                type: string
                default: "ada-x64"
        secrets:
            DISPATCH_TOKEN:
                description: "PAT with contents:write and pull-requests:write for auto-merge"
                required: true

env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1
    SCCACHE_GHA_ENABLED: true

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        permissions:
            # Required for magic-nix-cache to authenticate to FlakeHub Cache.
            id-token: write
            contents: read
        strategy:
            matrix:
                target: [x86_64-unknown-linux-gnu]
        steps:
            - uses: actions/checkout@v6

            - uses: cubething-qproj/infra/.github/actions/setup@main
              with:
                  cargo-cache-prefix: ${{ matrix.target }}

            - uses: nicknovitski/nix-develop@v1
              with:
                  arguments: .#ci

            - run: uv tool install qproj-scripts --from git+https://github.com/cubething-qproj/infra@main#subdirectory=scripts
            - run: qproj-scripts build
            - run: qproj-scripts check
            - run: qproj-scripts test

    # NOTE: auto-merge and notify-failure used to live here. They moved to
    # the caller template so they can gate on both `ci` and `coverage`
    # (coverage runs in a separate reusable workflow). Inputs and the
    # DISPATCH_TOKEN secret above are retained as no-ops so downstream
    # callers on older template versions still validate.
