name: Setup CI environment
description: >
  Shared CI setup: installs Nix, restores Nix and Cargo caches, and starts sccache.

inputs:
  cargo-cache-prefix:
    description: >
      Prefix for Cargo cache keys, e.g. "x86_64-unknown-linux-gnu".
    required: true

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Cache Nix store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 5G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-primary-key: never

    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: ${{ inputs.cargo-cache-prefix }}-ci

    - name: Run sccache
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        # Pin to match the sccache version provided by the nix devshell
        # (see flake.nix). The devshell's sccache is the actual server
        # (RUSTC_WRAPPER=sccache); the action's binary only runs
        # `--show-stats` in its post step. A version mismatch there
        # causes "Mismatch of client/server versions?" and fails CI on
        # cleanup. Bump in lockstep with nixpkgs' sccache.
        version: "v0.14.0"
